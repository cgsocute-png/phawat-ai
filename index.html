<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Phawat AI</title>
</head>
<body>
  <h2>Phawat AI 💙</h2>

  <div id="chatBox"></div>

  <input id="userInput" type="text" placeholder="พิมพ์ข้อความ">
  <button onclick="sendMessage()">ส่ง</button>

  <script>
    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value;

      if (!message) return;

      const chatBox = document.getElementById("chatBox");
      chatBox.innerHTML += "<p><b>คุณ:</b> " + message + "</p>";

      try {
        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ message })
        });

        const data = await response.json();

        if (data.reply) {
          chatBox.innerHTML += "<p><b>AI:</b> " + data.reply + "</p>";
        } else {
          chatBox.innerHTML += "<p style='color:red'><b>ERROR:</b> " + JSON.stringify(data) + "</p>";
        }

      } catch (err) {
        chatBox.innerHTML += "<p style='color:red'><b>FETCH ERROR:</b> " + err.message + "</p>";
      }

      input.value = "";
    }
  </script>
</body>
</html>
